services:
  db:
    image: postgres:16-alpine
    container_name: wikids-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wikids
    ports:
      - "5432:5432"
    volumes:
      - wikids_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wikids"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  wikids_postgres_data:
