services:
  db:
    image: postgres:16-alpine
    container_name: wikids-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wikids
    volumes:
      - wikids_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wikids"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: wikids-web:local
    container_name: wikids-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Override whatever might come from .env so the container always talks
      # to the `db` service over the compose network.
      DATABASE_URL: postgres://postgres:postgres@db:5432/wikids
      AUTH_SECRET: "${AUTH_SECRET:?AUTH_SECRET must be set in .env (run: openssl rand -base64 32)}"
      AUTH_URL: "${AUTH_URL:-http://localhost:3000}"
      # Required when Auth.js runs behind a reverse proxy or in a container
      # whose internal hostname differs from AUTH_URL.
      AUTH_TRUST_HOST: "true"
      NODE_ENV: production
    ports:
      - "8080:3000"

volumes:
  wikids_postgres_data:
